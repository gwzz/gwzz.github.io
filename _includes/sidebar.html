<div class="container-sidebar">
	<h4>About Me</h4>
	<div><img src="http://s.gravatar.com/avatar/8f49158e4335445be3440a96c1c69cf3?s=160" alt=""></div>
</div>
<div class="container-sidebar">
	<h4>Recent Post</h4>
	<ul>
	  {% for post in site.posts %}
	    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
	  {% endfor %}
	</ul>
</div>
<div class="container-sidebar">
	<h4>Category</h4>
	<ul>
	    {% for category in site.categories %}
	    <li><a href="/categories/{{ category | first }}/" title="view allposts">{{ category | first }} ({{ category | last | size }})</a>
	    </li>
	    {% endfor %}
	</ul>
</div>
