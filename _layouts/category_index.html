---
layout: default
title: Category
---
<div class="main fn-clear">
        <a href="/" rel="nofollow" >Home</a>
        <span>&#9830;</span>
        <a href="/archives" rel="nofollow" >Archives</a>
        <span>&#9830;</span>
        <a>Category:&nbsp;&nbsp{{ page.category }}</a>
    <div class="archives">
        <h4 class="page-title">All posts is here.&nbsp;&nbsp;&nbsp;<span>({{ site.posts | size }} posts.)</span></h4>
        {% for post in site.categories.[page.category] %}
            <article class="article-box">
                <h3 class="title"><a href="{{ post.url }}">{{ post.title }}</a></h3>
                <p class="date"><time pubdate="{{ post.date | date: '%b %d, %Y' }}">{{ post.date | date_to_string }}</time></p>
                <p class="desc">{{ post.description }}</p>
            </article>
        {% endfor %}
    </div>
</div>
