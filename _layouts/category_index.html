---
layout: default
---

    <div class="location">
    	<a href="/" rel="nofollow" >Home</a>
        <span>&#9830;</span>
        <a href="/archives" rel="nofollow" >Archives</a>
        <span>&#9830;</span>
        <a>Category:&nbsp;&nbsp{{ page.category }}</a>
    </div>
    {% for post in site.categories.[page.category] %}
        <div class="row-fluid">
            <div class="span12">
                <article class="post">
                    <h4>{{ post.date | date: '%Y' }}</h4>
                    <p><span>&#8227;</span><time pubdate="{{ post.date | date: '%b %d, %Y' }}">{{ post.date | date: '%b %d' }}</time></p>
                    <h2>
                      <a href="{{ post.url }}">{{ post.title | truncatewords: 10 | capitalize }}</a>
                    </h2>
                    {{ post.description}}
              </article>
            </div>
        </div>
    {% endfor %}
