---
layout: default
title: Gallery
---
<div class="main fn-clear">
  <div class="galleries">
    <h4 class="page-title"><a href="/{{ site.gallery.dir }}">{{ page.title }}</a></h4>
      {% for image in page.images %}
          <div class="gallery-image-wrapper">
              <a href="{{ image }}" data-lightbox="image-1">
                  <img class="gallery-image" src="thumbs/{{ image }}" />
              </a>
          </div>
      {% endfor %}
  </div>
</div>
